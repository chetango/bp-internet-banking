<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1168bd"/>
    </marker>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="1300" height="820" fill="#f8f9fa"/>

  <text x="650" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">Flujo OAuth2 Authorization Code + PKCE</text>
  <text x="650" y="52" text-anchor="middle" font-size="11" fill="#666">Recomendado para SPA y App Móvil según RFC 9700 / OAuth 2.1 — elimina Implicit Flow deprecado</text>
  <line x1="40" y1="62" x2="1260" y2="62" stroke="#ddd" stroke-width="1"/>

  <!-- ACTORS / LIFELINES -->
  <!-- Cliente/Browser -->
  <rect x="60" y="80" width="120" height="44" rx="5" fill="#1168bd" filter="url(#shadow)"/>
  <text x="120" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Cliente</text>
  <text x="120" y="116" text-anchor="middle" font-size="10" fill="#cce4ff">SPA / App Móvil</text>
  <line x1="120" y1="124" x2="120" y2="720" stroke="#1168bd" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- BFF -->
  <rect x="270" y="80" width="120" height="44" rx="5" fill="#2d8b6b" filter="url(#shadow)"/>
  <text x="330" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">BFF</text>
  <text x="330" y="116" text-anchor="middle" font-size="10" fill="#cef">Web / Mobile</text>
  <line x1="330" y1="124" x2="330" y2="720" stroke="#2d8b6b" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- AWS Cognito -->
  <rect x="480" y="80" width="140" height="44" rx="5" fill="#999" filter="url(#shadow)"/>
  <text x="550" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">AWS Cognito</text>
  <text x="550" y="116" text-anchor="middle" font-size="10" fill="#eee">Identity Provider</text>
  <line x1="550" y1="124" x2="550" y2="720" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Auth Service -->
  <rect x="700" y="80" width="130" height="44" rx="5" fill="#2e7d32" filter="url(#shadow)"/>
  <text x="765" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Auth Service</text>
  <text x="765" y="116" text-anchor="middle" font-size="10" fill="#c8e6c9">NestJS</text>
  <line x1="765" y1="124" x2="765" y2="720" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- API Gateway -->
  <rect x="920" y="80" width="140" height="44" rx="5" fill="#6b2d8b" filter="url(#shadow)"/>
  <text x="990" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">API Gateway</text>
  <text x="990" y="116" text-anchor="middle" font-size="10" fill="#e8d0ff">AWS + Kong</text>
  <line x1="990" y1="124" x2="990" y2="720" stroke="#6b2d8b" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Microservices -->
  <rect x="1130" y="80" width="130" height="44" rx="5" fill="#2e7d32" filter="url(#shadow)"/>
  <text x="1195" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Microservicio</text>
  <text x="1195" y="116" text-anchor="middle" font-size="10" fill="#c8e6c9">Destino</text>
  <line x1="1195" y1="124" x2="1195" y2="720" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ══ SEQUENCE STEPS ══ -->

  <!-- Step 1: PKCE generation -->
  <rect x="60" y="135" width="200" height="32" rx="4" fill="#e3f2fd" stroke="#1168bd" stroke-width="1"/>
  <text x="160" y="149" text-anchor="middle" font-size="9" font-weight="bold" fill="#1168bd">1. Genera code_verifier aleatorio</text>
  <text x="160" y="161" text-anchor="middle" font-size="9" fill="#333">code_challenge = SHA256(code_verifier) | Base64URL</text>

  <!-- Step 2: Auth request -->
  <line x1="120" y1="185" x2="545" y2="185" stroke="#1168bd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="200" y="172" width="260" height="20" rx="3" fill="#e3f2fd"/>
  <text x="330" y="185" text-anchor="middle" font-size="9" fill="#1168bd">2. GET /authorize?response_type=code&amp;code_challenge=...&amp;client_id=...</text>

  <!-- Step 3: Login UI -->
  <line x1="550" y1="210" x2="125" y2="210" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="200" y="197" width="260" height="20" rx="3" fill="#f5f5f5"/>
  <text x="330" y="210" text-anchor="middle" font-size="9" fill="#555">3. Redirige a Login UI (Cognito Hosted UI)</text>

  <!-- Step 4: Credentials -->
  <line x1="120" y1="235" x2="545" y2="235" stroke="#1168bd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="200" y="222" width="260" height="20" rx="3" fill="#e3f2fd"/>
  <text x="330" y="235" text-anchor="middle" font-size="9" fill="#1168bd">4. POST usuario + contraseña (+ TOTP si MFA activo)</text>

  <!-- Step 5: Authorization Code -->
  <line x1="550" y1="260" x2="125" y2="260" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="200" y="247" width="260" height="20" rx="3" fill="#f5f5f5"/>
  <text x="330" y="260" text-anchor="middle" font-size="9" fill="#555">5. Redirect callback → ?code=AUTH_CODE (corta duración ~60s)</text>

  <!-- Step 6: Token exchange via BFF -->
  <line x1="120" y1="285" x2="325" y2="285" stroke="#1168bd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="140" y="272" width="170" height="20" rx="3" fill="#e3f2fd"/>
  <text x="225" y="285" text-anchor="middle" font-size="9" fill="#1168bd">6. POST /token {code, code_verifier}</text>

  <!-- Step 7: BFF → Cognito token -->
  <line x1="330" y1="310" x2="545" y2="310" stroke="#2d8b6b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="340" y="297" width="200" height="20" rx="3" fill="#e8f5e9"/>
  <text x="440" y="310" text-anchor="middle" font-size="9" fill="#2d8b6b">7. POST /token {code, code_verifier, client_secret}</text>

  <!-- Step 8: Tokens response -->
  <line x1="550" y1="335" x2="335" y2="335" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="340" y="322" width="200" height="20" rx="3" fill="#f5f5f5"/>
  <text x="440" y="335" text-anchor="middle" font-size="9" fill="#555">8. {access_token (15min), id_token, refresh_token (24h)}</text>

  <!-- Step 9: BFF returns tokens to client -->
  <line x1="330" y1="360" x2="125" y2="360" stroke="#2d8b6b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="140" y="347" width="180" height="20" rx="3" fill="#e8f5e9"/>
  <text x="230" y="360" text-anchor="middle" font-size="9" fill="#2d8b6b">9. access_token (httpOnly cookie o memoria)</text>

  <!-- Step 10: API call -->
  <line x1="120" y1="390" x2="985" y2="390" stroke="#1168bd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="400" y="377" width="480" height="20" rx="3" fill="#e3f2fd"/>
  <text x="640" y="390" text-anchor="middle" font-size="9" fill="#1168bd">10. GET /api/movements  Authorization: Bearer {access_token}</text>

  <!-- Step 11: GW validates token -->
  <line x1="990" y1="415" x2="770" y2="415" stroke="#6b2d8b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="780" y="402" width="200" height="20" rx="3" fill="#ede7f6"/>
  <text x="880" y="415" text-anchor="middle" font-size="9" fill="#6b2d8b">11. Valida JWT firma + exp + iss (Cognito JWKS)</text>

  <!-- Step 12: GW → Microservice -->
  <line x1="990" y1="440" x2="1190" y2="440" stroke="#6b2d8b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="1000" y="427" width="180" height="20" rx="3" fill="#ede7f6"/>
  <text x="1090" y="440" text-anchor="middle" font-size="9" fill="#6b2d8b">12. Reenvía con cabecera X-User-Claims</text>

  <!-- Step 13: Response -->
  <line x1="1195" y1="465" x2="125" y2="465" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="500" y="452" width="580" height="20" rx="3" fill="#e8f5e9"/>
  <text x="790" y="465" text-anchor="middle" font-size="9" fill="#2e7d32">13. Respuesta de negocio → API GW → Cliente</text>

  <!-- Step 14: Refresh token flow -->
  <rect x="60" y="495" width="200" height="32" rx="4" fill="#fff8e1" stroke="#f0a500" stroke-width="1"/>
  <text x="160" y="509" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">14. access_token expirado (15 min)</text>
  <text x="160" y="521" text-anchor="middle" font-size="9" fill="#333">Cliente usa refresh_token silenciosamente</text>
  <line x1="120" y1="540" x2="325" y2="540" stroke="#f0a500" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="140" y="527" width="175" height="20" rx="3" fill="#fff8e1"/>
  <text x="227" y="540" text-anchor="middle" font-size="9" fill="#e65100">POST /refresh {refresh_token}</text>
  <line x1="330" y1="560" x2="545" y2="560" stroke="#f0a500" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="585" x2="335" y2="585" stroke="#f0a500" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="340" y="572" width="200" height="20" rx="3" fill="#fff8e1"/>
  <text x="440" y="585" text-anchor="middle" font-size="9" fill="#e65100">Nuevo access_token + refresh_token rotado</text>
  <line x1="330" y1="608" x2="125" y2="608" stroke="#f0a500" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PKCE explanation box -->
  <rect x="40" y="665" width="1220" height="130" rx="6" fill="#e3f2fd" stroke="#1168bd" stroke-width="1"/>
  <text x="55" y="685" font-size="12" font-weight="bold" fill="#1168bd">¿Por qué Authorization Code + PKCE y no Implicit Flow?</text>
  <text x="55" y="703" font-size="10" fill="#333">· Implicit Flow (deprecado) devuelve el access_token directamente en el URL fragment — expuesto en logs del servidor, historial del browser y referrer headers.</text>
  <text x="55" y="719" font-size="10" fill="#333">· PKCE (Proof Key for Code Exchange) agrega un par code_verifier / code_challenge que solo conoce el cliente que inició el flujo. Un atacante que intercepte el</text>
  <text x="55" y="735" font-size="10" fill="#333">  authorization code NO puede obtener tokens sin el code_verifier original.</text>
  <text x="55" y="751" font-size="10" fill="#333">· Refresh token rotation: cada uso del refresh_token genera uno nuevo e invalida el anterior. Si se detecta reutilización → sesión revocada automáticamente.</text>
  <text x="55" y="767" font-size="10" fill="#333">· Client Credentials Flow: descartado — solo para comunicación M2M (machine to machine), no para clientes interactivos de usuario final.</text>
  <text x="55" y="783" font-size="10" fill="#333">· Referencia normativa: RFC 6749 + RFC 7636 (PKCE) + RFC 9700 (OAuth 2.1 Best Current Practices).</text>
</svg>
