<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c62828"/>
    </marker>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1200" height="700" fill="#f8f9fa"/>

  <text x="600" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">C4 — Componentes: Transfer Service | Patrón Saga (Orquestación)</text>
  <text x="600" y="52" text-anchor="middle" font-size="11" fill="#666">Garantiza consistencia distribuida con compensación automática ante fallos</text>
  <line x1="40" y1="62" x2="1160" y2="62" stroke="#ddd" stroke-width="1"/>

  <!-- Transfer Service Boundary -->
  <rect x="40" y="80" width="680" height="500" rx="8" fill="none" stroke="#2e7d32" stroke-width="2" stroke-dasharray="7,3"/>
  <text x="56" y="100" font-size="12" font-weight="bold" fill="#2e7d32">Transfer Service [Microservice · Spring Boot]</text>

  <!-- Transfer Controller -->
  <g transform="translate(70,115)" filter="url(#shadow)">
    <rect width="180" height="80" rx="5" fill="#85bbf0"/>
    <rect x="0" y="0" width="180" height="26" rx="5" fill="#5a9fd4"/>
    <rect x="0" y="18" width="180" height="8" fill="#5a9fd4"/>
    <text x="90" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Transfer Controller</text>
    <text x="90" y="36" text-anchor="middle" font-size="9" fill="#333">[Component]</text>
    <text x="90" y="52" text-anchor="middle" font-size="9" fill="#333">Recibe petición HTTP.</text>
    <text x="90" y="65" text-anchor="middle" font-size="9" fill="#333">Valida JWT y dispara saga.</text>
  </g>

  <!-- Transfer Validator -->
  <g transform="translate(290,115)" filter="url(#shadow)">
    <rect width="180" height="80" rx="5" fill="#85bbf0"/>
    <rect x="0" y="0" width="180" height="26" rx="5" fill="#5a9fd4"/>
    <rect x="0" y="18" width="180" height="8" fill="#5a9fd4"/>
    <text x="90" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Transfer Validator</text>
    <text x="90" y="36" text-anchor="middle" font-size="9" fill="#333">[Component]</text>
    <text x="90" y="52" text-anchor="middle" font-size="9" fill="#333">Valida límites, saldo</text>
    <text x="90" y="65" text-anchor="middle" font-size="9" fill="#333">y restricciones SFC.</text>
  </g>

  <!-- Transfer Saga -->
  <g transform="translate(170,245)" filter="url(#shadow)">
    <rect width="220" height="110" rx="5" fill="#2e7d32"/>
    <rect x="0" y="0" width="220" height="30" rx="5" fill="#1b5e20"/>
    <rect x="0" y="22" width="220" height="8" fill="#1b5e20"/>
    <text x="110" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Transfer Saga</text>
    <text x="110" y="42" text-anchor="middle" font-size="9" fill="#c8e6c9">[Saga Orchestrator]</text>
    <text x="110" y="58" text-anchor="middle" font-size="9" fill="#fff">1. Validar saldo origen</text>
    <text x="110" y="72" text-anchor="middle" font-size="9" fill="#fff">2. Debitar cuenta origen</text>
    <text x="110" y="86" text-anchor="middle" font-size="9" fill="#fff">3. Acreditar cuenta destino</text>
    <text x="110" y="100" text-anchor="middle" font-size="9" fill="#fff">4. Notificar · 5. Auditar</text>
  </g>

  <!-- Compensation Handler -->
  <g transform="translate(170,400)" filter="url(#shadow)">
    <rect width="220" height="80" rx="5" fill="#c62828"/>
    <rect x="0" y="0" width="220" height="26" rx="5" fill="#8b0000"/>
    <rect x="0" y="18" width="220" height="8" fill="#8b0000"/>
    <text x="110" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Compensation Handler</text>
    <text x="110" y="36" text-anchor="middle" font-size="9" fill="#ffcdd2">[Compensating Tx]</text>
    <text x="110" y="52" text-anchor="middle" font-size="9" fill="#fff">Revierte débito si el crédito</text>
    <text x="110" y="65" text-anchor="middle" font-size="9" fill="#fff">falla. Garantiza atomicidad.</text>
  </g>

  <!-- Transfer Repository -->
  <g transform="translate(70,520)" filter="url(#shadow)">
    <rect width="180" height="44" rx="5" fill="#85bbf0"/>
    <text x="90" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Transfer Repository</text>
    <text x="90" y="34" text-anchor="middle" font-size="9" fill="#333">Persiste estado de la saga · Spring Data JPA</text>
  </g>

  <!-- Event Publisher -->
  <g transform="translate(420,520)" filter="url(#shadow)">
    <rect width="180" height="44" rx="5" fill="#85bbf0"/>
    <text x="90" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Event Publisher</text>
    <text x="90" y="34" text-anchor="middle" font-size="9" fill="#333">Publica TransferCompleted/Failed · SQS</text>
  </g>

  <!-- ══ EXTERNOS ══ -->
  <!-- Core Bancario -->
  <g transform="translate(820,165)" filter="url(#shadow)">
    <rect width="170" height="80" rx="5" fill="#999"/>
    <rect x="0" y="0" width="170" height="26" rx="5" fill="#777"/>
    <rect x="0" y="18" width="170" height="8" fill="#777"/>
    <text x="85" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Core Bancario</text>
    <text x="85" y="36" text-anchor="middle" font-size="9" fill="#eee">[Sistema Externo]</text>
    <text x="85" y="52" text-anchor="middle" font-size="9" fill="#eee">Débito / Crédito</text>
    <text x="85" y="65" text-anchor="middle" font-size="9" fill="#eee">en cuentas reales</text>
  </g>

  <!-- RDS Main -->
  <g transform="translate(820,310)" filter="url(#shadow)">
    <ellipse cx="85" cy="16" rx="85" ry="14" fill="#438dd5"/>
    <rect x="0" y="16" width="170" height="40" fill="#438dd5"/>
    <ellipse cx="85" cy="56" rx="85" ry="14" fill="#2d78c8"/>
    <text x="85" y="38" text-anchor="middle" font-size="9" fill="#fff">RDS PostgreSQL Multi-AZ</text>
    <text x="85" y="14" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">BD Principal</text>
  </g>

  <!-- SQS -->
  <g transform="translate(820,450)" filter="url(#shadow)">
    <rect width="170" height="55" rx="25" fill="#f0a500"/>
    <text x="85" y="24" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Bus de Eventos</text>
    <text x="85" y="40" text-anchor="middle" font-size="9" fill="#fff">Amazon SQS</text>
  </g>

  <!-- ══ ARROWS ══ -->
  <line x1="250" y1="195" x2="250" y2="245" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="260" y="225" font-size="9" fill="#333">dispara</text>
  <line x1="380" y1="195" x2="310" y2="245" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="330" y="232" font-size="9" fill="#333">valida</text>
  <line x1="280" y1="355" x2="280" y2="400" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="285" y="382" font-size="9" fill="#c62828">si fallo</text>
  <line x1="280" y1="480" x2="160" y2="520" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="290" y1="480" x2="510" y2="520" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="390" y1="300" x2="820" y2="205" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="560" y="245" font-size="9" fill="#333">debita/acredita · REST/HTTPS</text>
  <line x1="350" y1="355" x2="820" y2="340" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="530" y="360" font-size="9" fill="#333">persiste estado saga</text>
  <line x1="510" y1="542" x2="820" y2="478" stroke="#f0a500" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="640" y="500" font-size="9" fill="#f0a500">TransferCompleted/Failed</text>

  <!-- Saga steps annotation -->
  <rect x="40" y="618" width="700" height="64" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="55" y="636" font-size="11" font-weight="bold" fill="#2e7d32">Flujo Saga — Pasos y Compensación:</text>
  <text x="55" y="652" font-size="10" fill="#333">Paso 1: Validar → Paso 2: Debitar (Core) → Paso 3: Acreditar (Core) → Paso 4: Notificar → Paso 5: Auditar</text>
  <text x="55" y="668" font-size="10" fill="#c62828">Compensación: Si Paso 3 falla → se ejecuta reversa del Paso 2 (crédito a origen). Estado persiste en RDS para retry.</text>
</svg>
